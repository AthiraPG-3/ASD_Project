data:
  scans_dir: data/scans
  splits:
    train: train
    val: val
    test: test
  # Accept "validation" as val too (handled in code)
  class_names:
    control: 0
    autism: 1

features:
  image_size: [128, 128]
  grayscale: true

  preprocess:
    equalize_adapthist: true
    equalize_clip_limit: 0.01

  intensity_stats: true

  lbp:
    enabled: true
    radius: 2
    n_points: 16
    method: uniform

  glcm:
    enabled: true
    levels: 16
    distances: [1, 2, 3]
    angles: [0, 0.78539816339, 1.57079632679, 2.35619449019]  # 0, pi/4, pi/2, 3pi/4
    props: [contrast, dissimilarity, homogeneity, ASM, energy, correlation]

  hog:
    enabled: true
    orientations: 9
    pixels_per_cell: [8, 8]
    cells_per_block: [2, 2]

  gabor:
    enabled: true
    frequencies: [0.1, 0.2, 0.3]
    thetas: [0, 0.78539816339, 1.57079632679, 2.35619449019]

train:
  random_seed: 42
  selection_metric: f1_val
  pca_components: 128
  n_jobs: -1

  knn:
    k: [3, 5, 7, 8]

  svm:
    C: [0.1, 1, 10]
    gamma: [scale, 0.01, 0.001]
    poly_degree: [2, 3]

  decision_tree:
    max_depth: [null, 5, 10, 20]
    min_samples_split: [2, 5, 10]

  logistic_regression:
    C: [0.1, 1, 10]
    max_iter: 2000

  random_forest:
    n_estimators: [200, 500]
    max_depth: [null, 10, 20]
